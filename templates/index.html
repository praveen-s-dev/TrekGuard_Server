<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TrekGuard PRO | Rescue HQ</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --danger: #f85149; --accent: #58a6ff; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .tile { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        .tile h3 { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; margin: 0; }
        .tile .val { font-size: 2.2rem; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .sos-card { background: #211111; border: 1px solid var(--danger); border-radius: 10px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px #f8514933; } 50% { box-shadow: 0 0 20px #f8514966; } 100% { box-shadow: 0 0 5px #f8514933; } }
        .btn-map { background: var(--text); color: black; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: var(--danger)">🚨 SYSTEM STANDBY</h1>
        <button onclick="unlock()" style="padding: 15px 40px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">INITIALIZE COMMAND CENTER</button>
    </div>

    <h1 style="border-bottom: 1px solid #30363d; padding-bottom: 10px;">🏔️ TrekGuard <span style="color: var(--danger)">PRO</span> Command</h1>

    <div class="grid">
        <div class="tile"><h3>Temp</h3><div id="t-val" class="val">--</div><div>Celsius</div></div>
        <div class="tile"><h3>Pressure</h3><div id="p-val" class="val">--</div><div>hPa</div></div>
        <div class="tile"><h3>Altitude</h3><div id="a-val" class="val">--</div><div>Meters</div></div>
        <div class="tile"><h3>Gas (MQ135)</h3><div id="g-val" class="val">--</div><div id="g-stat">STABLE</div></div>
    </div>

    <div id="alert-feed"></div>

    <audio id="siren" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop></audio>

    <script>
        let lastLen = 0; let active = false;
        function unlock() { document.getElementById('siren').play().then(() => { document.getElementById('siren').pause(); document.getElementById('overlay').style.display='none'; active=true; }); }
        
        async function refresh() {
            try {
                const res = await fetch('/api/get_alerts');
                const data = await res.json();
                if (data.length > 0) {
                    const last = data[data.length-1];
                    document.getElementById('t-val').innerText = last.temp + "°";
                    document.getElementById('p-val').innerText = Math.round(last.pres);
                    document.getElementById('a-val').innerText = Math.round(last.alt);
                    document.getElementById('g-val').innerText = last.gas;

                    if (data.length > lastLen) { if (active) document.getElementById('siren').play(); lastLen = data.length; }

                    document.getElementById('alert-feed').innerHTML = data.slice().reverse().map(a => `
                        <div class="sos-card">
                            <div>
                                <h2 style="margin: 0; color: var(--danger)">🚨 SOS: ${a.type}</h2>
                                <p style="margin: 5px 0; opacity: 0.7">Trekker ID: ${a.id} | Environment: ${a.temp}C / ${a.gas} PPM</p>
                            </div>
                            <a href="https://www.google.com/maps?q=${a.lat},${a.lon}" target="_blank" class="btn-map">📍 VIEW MAP</a>
                        </div>
                    `).join('');
                }
            } catch (e) { console.log("Reconnecting..."); }
        }
        setInterval(refresh, 3000);
    </script>
</body>
</html>
